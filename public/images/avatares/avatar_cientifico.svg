  <ellipse cx="38" cy="41" rx="3.5" ry="2" fill="#F4A89A" opacity="0.5"/>
  <ellipse cx="62" cy="41" rx="3.5" ry="2" fill="#F4A89A" opacity="0.5"/>
  <!-- Tubo de ensayo -->
  <rect x="66" y="60" width="6" height="16" rx="3" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <rect x="67" y="67" width="4" height="9" rx="2" fill="#86EFAC" opacity="0.7"/>
