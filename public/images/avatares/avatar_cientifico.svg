  <path d="M38 24 Q34 13 40 11" stroke="#9CA3AF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M65 28 Q70 18 64 14" stroke="#9CA3AF" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M62 24 Q66 13 60 11" stroke="#9CA3AF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Lentes redondos de científico -->
  <circle cx="43" cy="36" r="5" fill="none" stroke="#374151" stroke-width="1.5"/>
  <circle cx="57" cy="36" r="5" fill="none" stroke="#374151" stroke-width="1.5"/>
  <line x1="48" y1="36" x2="52" y2="36" stroke="#374151" stroke-width="1.2"/>
