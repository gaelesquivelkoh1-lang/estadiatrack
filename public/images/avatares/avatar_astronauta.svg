<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fondo espacial -->
  <circle cx="50" cy="50" r="48" fill="#0F172A" stroke="#818CF8" stroke-width="1.5"/>
  <!-- Estrellas -->
  <circle cx="15" cy="20" r="1" fill="white" opacity="0.8"/>
  <circle cx="80" cy="15" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="25" cy="70" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="85" cy="65" r="1" fill="white" opacity="0.8"/>
  <circle cx="70" cy="80" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="10" cy="45" r="0.8" fill="white" opacity="0.7"/>
  <!-- Traje astronauta cuerpo -->
  <ellipse cx="50" cy="78" rx="22" ry="15" fill="#E2E8F0"/>
  <rect x="34" y="57" width="32" height="23" rx="5" fill="#E2E8F0"/>
  <!-- Detalles del traje -->
  <rect x="38" y="62" width="10" height="8" rx="2" fill="#CBD5E1" stroke="#94A3B8" stroke-width="0.5"/>
  <rect x="52" y="62" width="10" height="8" rx="2" fill="#CBD5E1" stroke="#94A3B8" stroke-width="0.5"/>
  <!-- Panel de control -->
  <rect x="43" y="58" width="14" height="10" rx="2" fill="#1E293B"/>
  <circle cx="46" cy="61" r="1.5" fill="#EF4444"/>
  <circle cx="50" cy="61" r="1.5" fill="#22C55E"/>
  <circle cx="54" cy="61" r="1.5" fill="#F59E0B"/>
  <rect x="45" y="64" width="10" height="2" rx="0.5" fill="#3B82F6"/>
  <!-- Casco -->
  <circle cx="50" cy="36" r="20" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1.5"/>
  <!-- Visera -->
  <ellipse cx="50" cy="36" rx="14" ry="13" fill="#BFDBFE" opacity="0.7"/>
  <!-- Reflejo visera -->
  <ellipse cx="44" cy="30" rx="5" ry="3" fill="white" opacity="0.3" transform="rotate(-20 44 30)"/>
  <!-- Cara dentro del casco -->
  <circle cx="44" cy="35" r="3" fill="white"/>
  <circle cx="56" cy="35" r="3" fill="white"/>
  <circle cx="44" cy="35" r="1.8" fill="#1E3A8A"/>
  <circle cx="56" cy="35" r="1.8" fill="#1E3A8A"/>
  <circle cx="45" cy="34" r="0.7" fill="white"/>
  <circle cx="57" cy="34" r="0.7" fill="white"/>
  <path d="M45 42 Q50 46 55 42" stroke="#C0847A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Antena casco -->
  <line x1="50" y1="16" x2="50" y2="10" stroke="#94A3B8" stroke-width="1.5"/>
  <circle cx="50" cy="9" r="2" fill="#EF4444"/>
</svg>
